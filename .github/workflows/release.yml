name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          cp install.sh "dist/arx-${VERSION}-install.sh"
          cp install.bat "dist/arx-${VERSION}-install.bat"

          git archive --format=tar.gz --prefix="arx-${VERSION}/" -o "dist/arx-${VERSION}-source.tar.gz" HEAD

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS

      - name: Upload workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: arx-release-${{ github.ref_name }}
          path: dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          draft: false
          prerelease: true
