name: Build and Publish Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chmod +x ./scripts/generate_release_artifacts.sh || true

      - name: Build release artifacts
        run: |
          set -euo pipefail
          # Resolve version from tag (GITHUB_REF will be refs/tags/<tag>)
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Building artifacts for version: $VERSION"
          ./scripts/generate_release_artifacts.sh "$VERSION"
          ls -la dist

      - name: Create GitHub release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Automated release created by CI. Artifacts included from dist/.
            Includes the lean bootstrap runtime bundle (dist/arx-runtime.zip) used by the hosted installer.
          files: dist/*

      - name: Done
        run: echo "Release published for tag ${{ github.ref_name }}"
